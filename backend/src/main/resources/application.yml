# application.yml — конфигурация Spring Boot для mini-chronos
#
# Этот файл читается Spring Boot при старте.
# Три профиля: базовый (этот файл) + dev (application-dev.yml) + prod (application-prod.yml)
# Spring Boot автоматически мержит: базовый + активный профиль.

spring:
  application:
    name: mini-chronos

  session:
    store-type: none  # JWT stateless — HTTP сессии не используем.

  # ── DATABASE ─────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mini_chronos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: MiniChronosPool

  # ── JPA / HIBERNATE ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      # none: Hibernate НЕ трогает схему — Liquibase управляет ею.
      # validate: проверяет соответствие entity ↔ таблицы при старте (рекомендуется).
      # Переключи на validate после создания всех Liquibase changesets.
      ddl-auto: none

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

    # ВАЖНО: отключить open-in-view!
    # Держит DB-соединение открытым на всё время HTTP-запроса.
    # Скрывает N+1 проблемы и нарушает границы слоёв.
    # С false: LazyInitializationException явно укажет где нужен @EntityGraph.
    open-in-view: false

  # ── LIQUIBASE ─────────────────────────────────────────────────────────────
  # Spring Boot автоматически настраивает Liquibase из этих свойств.
  # НЕ нужен отдельный @Bean SpringLiquibase — автоконфигурация делает всё!
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    # dev: выполняет changesets с context="dev" И без context (всегда).
    # prod: changesets с context="dev" (тестовые данные) НЕ выполняются.
    contexts: dev

# ── SERVER ──────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── APP-SPECIFIC CONFIGURATION ──────────────────────────────────────────────
# Кастомные свойства приложения — читаются через @Value в компонентах.
app:
  jwt:
    # Секрет для подписи JWT токенов (HS256).
    # ТРЕБОВАНИЕ: минимум 32 символа (256 бит для HS256).
    # В production: переопределяй через переменную окружения APP_JWT_SECRET.
    # НИКОГДА не коммить реальный секрет в Git!
    secret: ${APP_JWT_SECRET:mini-chronos-dev-secret-key-at-least-32-chars}

    # Время жизни access token (в миллисекундах).
    # 900000 = 15 минут — стандарт для ERP-систем.
    # Короткое время жизни: если токен украден — быстро протухнет.
    access-token-expiration: 900000

    # Время жизни refresh token (в миллисекундах).
    # 604800000 = 7 дней — пользователь не переходит каждую неделю.
    refresh-token-expiration: 604800000

  cors:
    # Разрешённые origins для CORS.
    # dev: Angular dev server на порту 4200.
    # prod: переопределить через APP_CORS_ALLOWED_ORIGINS=https://chronos.alphaloop.de
    # Несколько origins через запятую: http://localhost:4200,https://staging.example.com
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.hibernate.SQL: DEBUG
    # TRACE показывает реальные значения параметров запросов.
    # ВНИМАНИЕ: может логировать sensitive data (пароли, токены) — только dev!
    org.hibernate.orm.jdbc.bind: TRACE
    liquibase: INFO
    de.alphaloop.chronos: DEBUG